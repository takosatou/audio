<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wave Generator for Audio Masking test</title>
<style>
  .val { display: inline-block; }
</style>
</head>
<body>
  <h3>逆向マスキング用プローブ</h3>
  
  <div>
    Freq = <select id="freq0">
      <option value="800">800 Hz</option>
      <option value="1000">1000 Hz</option>
      <option value="1200">1200 Hz</option>
      <option value="1500" selected>1500 Hz</option>
      <option value="1800">1800 Hz</option>    
      <option value="2000">2000 Hz</option>
    </select>
  </div>
  <div>
    Volume = <input id="volume0" type="range" min="-100" max="0" step="1" value="-40">
    <div id="volume0value" class="val"></div>
  </div>
  
  <div>
    DeltaT = <select id="t0">
      <option value="0">0</option>
      <option value="5">5 ms</option>
      <option value="10" selected>10 ms</option>
      <option value="20">20 ms</option>
    </select>
  </div>

  <h3>マスク</h3>
  <div>
    Freq = 1000 Hz
  </div>
  <div>
    Duration = 250 ms
  </div>
  <div>
    Volume = <input id="volume1" type="range" min="-100" max="0" step="5" value="0">
    <div id="volume1value" class="val"></div>
  </div>

  
  <h3>順向マスキング用プローブ</h3>

  <div>
    DeltaT = <select id="t2">
      <option value="0">0</option>
      <option value="10" selected>10 ms</option>
      <option value="30">30 ms</option>
      <option value="60">60 ms</option>
      <option value="100">100 ms</option>      
    </select>
  </div>
  
  <div>
    Freq = <select id="freq2">
      <option value="800">800 Hz</option>
      <option value="1000">1000 Hz</option>
      <option value="1200">1200 Hz</option>
      <option value="1500" selected>1500 Hz</option>
      <option value="1800">1800 Hz</option>    
      <option value="2000">2000 Hz</option>
    </select>
  </div>
  <div>
    Volume = <input id="volume2" type="range" min="-100" max="0" step="1" value="-40">
    <div id="volume2value" class="val"></div>
  </div>
 
  
  <button id="play">Play</button>

  
<script>
  function $$(id) {
      return document.getElementById(id)
  }

  let audioContext = null

  function setup() {
      if (audioContext != null) return
      audioContext = new AudioContext()
  }

  
  function doit(freq0, volume0, t0, dur0,
                freq1, volume1, t1, dur1,
                freq2, volume2, t2, dur2) {
      setup()

      gainNode0 = audioContext.createGain()
      gainNode0.connect(audioContext.destination)
      gainNode0.gain.value = Math.pow(10, volume0 / 20)
      
      gainNode1 = audioContext.createGain()
      gainNode1.connect(audioContext.destination)
      gainNode1.gain.value = Math.pow(10, volume1 / 20)

      gainNode2 = audioContext.createGain()
      gainNode2.connect(audioContext.destination)
      gainNode2.gain.value = Math.pow(10, volume2 / 20)
      
      const osc0 = audioContext.createOscillator()
      osc0.connect(gainNode0)
      osc0.type = 'sine'
      osc0.frequency.value = freq0

      const osc1 = audioContext.createOscillator()
      osc1.connect(gainNode1)
      osc1.type = 'sine'
      osc1.frequency.value = freq1

      const osc2 = audioContext.createOscillator()
      osc2.connect(gainNode2)
      osc2.type = 'sine'
      osc2.frequency.value = freq2

      const t = audioContext.currentTime + 0.2
      osc0.start(t + t0)
      osc0.stop(t + t0 + dur0)
      osc1.start(t + t1)
      osc1.stop(t + t1 + dur1)
      osc2.start(t + t2)
      osc2.stop(t + t2 + dur2)
  }

  function play() {
      const t0 = Number($$('t0').value) / 1000
      const t2 = Number($$('t2').value) / 1000
      doit(
          Number($$('freq0').value),
          Number($$('volume0').value),
          0,
          0.010,

          1000,
          Number($$('volume1').value),
          0.010 + t0,
          0.250,
          
          Number($$('freq2').value),
          Number($$('volume2').value),
          0.010 + t0 + 0.250 + t2,
          0.010
      )
  }
  
  $$('play').addEventListener('click', play)

  function setSliderHandler(id) {
      $$(id).addEventListener('input', e => {
          const v = e.target.value
          $$(id + 'value').innerHTML = v
      })
      $$(id + 'value').innerHTML = $$(id).value
  }
  setSliderHandler('volume0')  
  setSliderHandler('volume1')
  setSliderHandler('volume2')
  
</script>
</body>
</html>
